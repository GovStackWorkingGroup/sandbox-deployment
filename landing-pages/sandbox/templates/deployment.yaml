apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- toYaml .Values.template.labels | nindent 6 }}
  template:
    metadata:
      labels: 
        {{- toYaml .Values.template.labels | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.containers.name }}
          image: "{{ .Values.containers.image }}"
          imagePullPolicy: {{ .Values.containers.imagePullPolicy }}
          ports:
          - containerPort: 80
            name: server
          resources:
            limits:
              cpu: "500m"
              memory: 1Gi
            requests:
              cpu: "200m"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- toYaml .Values.labels | nindent 4 }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http
spec:
  tls:
    - hosts:
        - {{ .Values.tls.dnsNames }}
      secretName: {{ .Values.tls.certificateName }}
  ingressClassName: nginx
  rules:
    - host: {{ .Values.tls.dnsNames }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: 80
---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.name }}
spec:
  dnsNames:
    - {{ .Values.tls.dnsNames }}
  secretName: {{ .Values.tls.certificateName }}
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer