name: "simulation"
replicaCount: 1
labels: 
  app: "simulation"
template:
  labels: 
    app: "simulation"
containers:
  name: frontend
  image: ghcr.io/govstackworkinggroup/sandbox-usecase-usct-frontend:latest
  imagePullPolicy: "Always"
profiles: "container"
service:
  name: "simulation"
  type: ClusterIP
  port: 80
  targetPort: 80
tls:
  dnsNames: "simulation.govstack.global"
  certificateName: "simulation-tls"