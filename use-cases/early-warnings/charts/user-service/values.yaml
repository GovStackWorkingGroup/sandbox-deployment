enabled: true
backend:
  name: user-service
  containers:
    name: user-service
    image: ghcr.io/govstackworkinggroup/sandbox-usecase-earlywarning-userservice
    imageTag: govstack-2
    imagePullPolicy: IfNotPresent
    port: 8080

db:
  name: user-db-service
  containers:
    name: user-db-service
    image: postgres:14-alpine
    imagePullPolicy: IfNotPresent
    port: 5432
    mountName: pgdata
    mountPath: /var/lib/postgresql/data
    storage: 1Gi
    username: user
    password: password
    database:
      name: user-db

kafka:
  bootstrapServers: early-warning-kafka:9092

tls:
  dnsNames: "early-warnings.playground.sandbox-playground.com"
  certificateName: "early-warnings-tls"

enabled: true
frontend:
  name: "frontend"
  replicaCount: 1
  labels:
    app: "frontend"
  template:
    labels:
      app: "frontend"
  spec:
    container:
      name: frontend
      image: ghcr.io/govstackworkinggroup/sandbox-usecase-earlywarning-frontend
      imageTag: plusserver-baseurl-s
      imagePullPolicy: IfNotPresent

  profiles: "container"
  service:
    name: "frontend"
    type: ClusterIP
    port: 80
    targetPort: 80

threatsvc:
  name: threat-service